<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igor Ghana - Anti-Fraud Portal</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --primary: #ff3333;
            --primary-hover: #cc0000;
            --success: #00ffcc;
            --warning: #ffaa00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .portal-container { max-width: 500px; width: 100%; background: var(--card-bg); padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); border: 1px solid #222; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; color: var(--text-main); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header p { color: var(--text-muted); font-size: 0.95rem; }

        /* Tabs System */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-weight: bold; cursor: pointer; padding: 5px 10px; font-size: 0.95rem; transition: color 0.2s; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .form-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .form-section.active { display: block; }

        .search-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-group label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: bold; }
        .input-wrapper { display: flex; gap: 10px; }
        
        input[type="text"], select, textarea { width: 100%; background: #111; border: 1px solid #333; padding: 15px; border-radius: 6px; color: white; font-size: 1.1rem; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--primary); }
        textarea { font-size: 1rem; resize: none; height: 80px; }
        
        .action-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; width: 100%; }
        .action-btn:hover { background: var(--primary-hover); }

        .result-box { display: none; margin-top: 25px; padding: 20px; border-radius: 8px; animation: fadeIn 0.3s ease-in-out; }
        .result-box.clean { display: block; background: rgba(0, 255, 204, 0.05); border: 1px solid var(--success); }
        .result-box.danger { display: block; background: rgba(255, 51, 51, 0.05); border: 1px solid var(--primary); }
        
        .result-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .clean .result-title { color: var(--success); }
        .danger .result-title { color: var(--primary); }
        .result-desc { color: #ccc; font-size: 0.95rem; line-height: 1.5; }
        
        .meta-list { margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; color: var(--text-muted); }
        .meta-item strong { color: #eee; font-family: monospace; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="header">
            <h1>🛡️ IGOR GHANA</h1>
            <p>Decentralized crowd-sourced intelligence network.</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('search')">🔍 Check Number</button>
            <button class="tab-btn" onclick="switchTab('report')">📢 Report Fraud</button>
        </div>

        <!-- SEARCH TAB -->
        <div id="searchSection" class="form-section active">
            <form onsubmit="searchNumber(event)">
                <div class="search-group">
                    <label>Enter Mobile Number</label>
                    <div class="input-wrapper">
                        <input type="text" id="searchPhone" placeholder="e.g. 0244XXXXXX" required autocomplete="off">
                    </div>
                </div>
                <button type="submit" class="action-btn" id="searchBtn">Verify Target Vector</button>
            </form>
        </div>

        <!-- REPORT TAB -->
        <div id="reportSection" class="form-section">
            <form onsubmit="submitReport(event)">
                <div class="search-group">
                    <label>Scammer's Mobile Number</label>
                    <input type="text" id="reportPhone" placeholder="e.g. 055XXXXXXX" required autocomplete="off">
                </div>
                <div class="search-group">
                    <label>Fraud Category</label>
                    <select id="reportCategory">
                        <option value="Fake Promo Wins">Fake Promo Wins</option>
                        <option value="MoMo Cashout Fraud">MoMo Cashout Fraud</option>
                        <option value="Impersonation Scams">Impersonation / Identity Theft</option>
                        <option value="Other Financial Fraud">Other Advanced Scams</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>Incident Details / Evidence</label>
                    <textarea id="reportText" placeholder="Describe how the scam operated briefly..." required></textarea>
                </div>
                <!-- Public reporting bypass header uses client-side tracking node key -->
                <button type="submit" class="action-btn" id="reportBtn" style="background: #e6b800; color: black;">Submit Public Intel Report</button>
            </form>
        </div>

        <div id="resultBox" class="result-box">
            <div id="resultTitle" class="result-title"></div>
            <p id="resultDesc" class="result-desc"></p>
            <div id="metaList" class="meta-list"></div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById('resultBox').className = "result-box"; 
            
            if(tab === 'search') {
                event.target.classList.add('active');
                document.getElementById('searchSection').classList.add('active');
            } else {
                event.target.classList.add('active');
                document.getElementById('reportSection').classList.add('active');
            }
        }

        async function searchNumber(event) {
            event.preventDefault();
            const input = document.getElementById('searchPhone');
            const btn = document.getElementById('searchBtn');
            const resultBox = document.getElementById('resultBox');
            const resultTitle = document.getElementById('resultTitle');
            const resultDesc = document.getElementById('resultDesc');
            const metaList = document.getElementById('metaList');

            const phone = input.value.trim();
            btn.disabled = true;
            btn.textContent = "Querying Database Core...";
            resultBox.className = "result-box"; 

            try {
                const res = await fetch(`/api/check/${phone}`);
                const data = await res.json();

                if (data.is_flagged) {
                    resultBox.classList.add('danger');
                    resultTitle.innerHTML = `🚨 High Risk Profile (${data.risk_level})`;
                    resultDesc.textContent = `Warning! This endpoint matches confirmed fraudulent vectors logged by partner nodes.`;
                    metaList.innerHTML = `
                        <div class="meta-item">Category: <strong>${data.details.category}</strong></div>
                        <div class="meta-item">Total Reports: <strong>${data.details.total_reports}</strong></div>
                        <div class="meta-item">Last Flagged: <strong>${new Date(data.details.last_incident).toLocaleString()}</strong></div>
                    `;
                } else {
                    resultBox.classList.add('clean');
                    resultTitle.innerHTML = `✅ Verification Clear`;
                    resultDesc.textContent = `No dynamic fraud signatures found for this number vector.`;
                    metaList.innerHTML = '';
                }
            } catch (err) {
                resultBox.classList.add('danger');
                resultTitle.innerHTML = `⚠️ Sync Failure`;
                resultDesc.textContent = `Could not cleanly reach the central server pipeline.`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Verify Target Vector";
            }
        }

        async function submitReport(event) {
            event.preventDefault();
            const phoneInput = document.getElementById('reportPhone');
            const catSelect = document.getElementById('reportCategory');
            const textInput = document.getElementById('reportText');
            const btn = document.getElementById('reportBtn');
            const resultBox = document.getElementById('resultBox');
            const resultTitle = document.getElementById('resultTitle');
            const resultDesc = document.getElementById('resultDesc');

            btn.disabled = true;
            btn.textContent = "Broadcasting Intel...";
            resultBox.className = "result-box";

            try {
                // Submit directly via public simulation parameters
                const res = await fetch('/api/ussd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phoneNumber: "0000000000", 
                        text: `2*${phoneInput.value.trim()}*${catSelect.value} - ${textInput.value.trim()}`,
                        sessionId: "web_anonymous_node_" + Date.now()
                    })
                });

                if (res.ok) {
                    resultBox.classList.add('clean');
                    resultTitle.innerHTML = `🛡️ Broadcast Success`;
                    resultDesc.textContent = `The fraud signature has been committed to the decentralized registry database successfully.`;
                    
                    // Reset forms on successful transaction push
                    phoneInput.value = '';
                    textInput.value = '';
                } else {
                    throw new Error();
                }
            } catch (err) {
                resultBox.classList.add('danger');
                resultTitle.innerHTML = `⚠️ Broadcast Blocked`;
                resultDesc.textContent = `Failed to commit intelligence package. Connection pool rejected.`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Submit Public Intel Report";
            }
        }
    </script>
</body>
</html>
